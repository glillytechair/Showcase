<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What we’ve built</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #05070a;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #f8fafc;
      padding: 2rem;
    }

    .hero {
      text-align: center;
      max-width: 880px;
      padding: 3.5rem 2rem;
      border-radius: 24px;
      background: radial-gradient(120% 120% at 50% 0%, rgba(30, 58, 138, 0.12), transparent 60%),
                  rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 0.95rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #93c5fd;
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.25);
      margin-bottom: 1.5rem;
    }

    .badge svg {
      width: 14px;
      height: 14px;
      color: #60a5fa;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.6;
      color: #94a3b8;
      max-width: fit-content;
      margin: 0 auto;
      white-space: nowrap;
    }

    .divider {
      width: 80px;
      height: 2px;
      margin: 2rem auto 0;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
      </svg>
      Tech Department
    </div>
    <h1>What we’ve built</h1>
    <p class="subtitle">The latest features, enhancements, and improvements from our engineering team.</p>
    <div class="divider"></div>
  </section>
</body>
</html>
